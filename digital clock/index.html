<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Digital Clock</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: rgb(21, 134, 87);
      --card-bg: #ffffff;
      --text-primary: #1a1a2e;
      --text-secondary: #64748b;
      --accent: #0ea5e9;
      --accent-hover: #0284c7;
      --shadow: 0 4px 20px rgba(0,0,0,0.08);
    }

    .dark {
      --bg: #0f172a;
      --card-bg: #1e293b;
      --text-primary: #f1f5f9;
      --text-secondary: #94a3b8;
      --accent: #38bdf8;
      --accent-hover: #0ea5e9;
      --shadow: 0 4px 20px rgba(0,0,0,0.3);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      transition: background-color 0.5s, color 0.5s;
    }

    body {
      font-family: 'Outfit', sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 1rem;
    }

    .container {
      width: 100%;
      max-width: 500px;
    }

    .clock-card {
      background: var(--card-bg);
      border-radius: 16px;
      box-shadow: var(--shadow);
      padding: 2rem;
      position: relative;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
    }

    .title {
      font-family: 'Orbitron', sans-serif;
      font-size: 1.2rem;
      font-weight: 700;
      letter-spacing: 2px;
      color: var(--accent);
    }

    .mode-toggle {
      background: var(--accent);
      border: none;
      border-radius: 50%;
      width: 44px;
      height: 44px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.3s, background-color 0.3s;
    }

    .mode-toggle:hover {
      transform: scale(1.1);
      background: var(--accent-hover);
    }

    .mode-toggle svg {
      width: 22px;
      height: 22px;
      fill: #fff;
    }

    .tabs {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
      border-bottom: 2px solid var(--text-secondary);
      opacity: 0.3;
    }

    .tab {
      flex: 1;
      padding: 0.75rem;
      background: none;
      border: none;
      font-family: 'Outfit', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      color: var(--text-secondary);
      cursor: pointer;
      position: relative;
      transition: color 0.3s;
    }

    .tab.active {
      color: var(--accent);
    }

    .tab.active::after {
      content: '';
      position: absolute;
      bottom: -2px;
      left: 0;
      right: 0;
      height: 2px;
      background: var(--accent);
    }

    .tab-content {
      display: none;
    }

    .tab-content.active {
      display: block;
    }

    .time-display {
      font-family: 'Orbitron', sans-serif;
      font-size: 4rem;
      font-weight: 700;
      text-align: center;
      letter-spacing: 4px;
      text-shadow: 0 0 30px var(--accent);
      margin-bottom: 1rem;
    }

    .date-display {
      text-align: center;
      color: var(--text-secondary);
      font-size: 1.1rem;
      margin-bottom: 1.5rem;
    }

    .format-toggle {
      display: flex;
      justify-content: center;
      gap: 1rem;
    }

    .format-btn {
      background: var(--bg);
      border: 2px solid var(--accent);
      color: var(--accent);
      padding: 0.5rem 1rem;
      border-radius: 20px;
      font-family: 'Outfit', sans-serif;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.3s;
    }

    .format-btn.active {
      background: var(--accent);
      color: #fff;
    }

    .controls {
      display: flex;
      justify-content: center;
      gap: 1rem;
      flex-wrap: wrap;
      margin-top: 1.5rem;
    }

    .btn {
      background: var(--accent);
      color: #fff;
      border: none;
      padding: 0.75rem 1.5rem;
      border-radius: 25px;
      font-family: 'Outfit', sans-serif;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      min-width: 100px;
    }

    .btn:hover {
      background: var(--accent-hover);
      transform: scale(1.05);
    }

    .btn.secondary {
      background: transparent;
      border: 2px solid var(--accent);
      color: var(--accent);
    }

    .btn.secondary:hover {
      background: var(--accent);
      color: #fff;
    }

    .btn.danger {
      background: #ef4444;
    }

    .btn.danger:hover {
      background: #dc2626;
    }

    .laps-container {
      margin-top: 1.5rem;
      max-height: 200px;
      overflow-y: auto;
    }

    .lap-item {
      display: flex;
      justify-content: space-between;
      padding: 0.5rem 1rem;
      background: var(--bg);
      border-radius: 8px;
      margin-bottom: 0.5rem;
      font-family: 'Orbitron', sans-serif;
      font-size: 0.9rem;
    }

    .alarm-inputs {
      display: flex;
      justify-content: center;
      gap: 0.5rem;
      margin-bottom: 1rem;
    }

    .alarm-select {
      background: var(--bg);
      border: 2px solid var(--accent);
      color: var(--text-primary);
      padding: 0.5rem 1rem;
      border-radius: 8px;
      font-family: 'Outfit', sans-serif;
      font-size: 1.1rem;
      cursor: pointer;
    }

    .alarm-list {
      margin-top: 1.5rem;
      max-height: 250px;
      overflow-y: auto;
    }

    .alarm-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem;
      background: var(--bg);
      border-radius: 12px;
      margin-bottom: 0.75rem;
    }

    .alarm-time {
      font-family: 'Orbitron', sans-serif;
      font-size: 1.5rem;
    }

    .alarm-actions {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .toggle-switch {
      position: relative;
      width: 50px;
      height: 26px;
    }

    .toggle-switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: var(--text-secondary);
      border-radius: 26px;
      transition: 0.3s;
    }

    .slider:before {
      position: absolute;
      content: "";
      height: 20px;
      width: 20px;
      left: 3px;
      bottom: 3px;
      background: #fff;
      border-radius: 50%;
      transition: 0.3s;
    }

    input:checked + .slider {
      background: var(--accent);
    }

    input:checked + .slider:before {
      transform: translateX(24px);
    }

    .delete-btn {
      background: #ef4444;
      border: none;
      border-radius: 8px;
      width: 32px;
      height: 32px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.3s;
    }

    .delete-btn:hover {
      background: #dc2626;
    }

    .delete-btn svg {
      width: 16px;
      height: 16px;
      fill: #fff;
    }

    .alarm-ring {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.8);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }

    .alarm-ring.active {
      display: flex;
    }

    .alarm-popup {
      background: var(--card-bg);
      padding: 2rem;
      border-radius: 16px;
      text-align: center;
      max-width: 300px;
    }

    .alarm-popup h2 {
      font-family: 'Orbitron', sans-serif;
      font-size: 2rem;
      color: var(--accent);
      margin-bottom: 1rem;
    }

    .alarm-popup p {
      margin-bottom: 1.5rem;
      color: var(--text-secondary);
    }

    @media (min-width: 768px) {
      .time-display {
        font-size: 6rem;
      }
      
      .clock-card {
        padding: 2.5rem;
      }
    }

    @media (max-width: 400px) {
      .time-display {
        font-size: 3rem;
        letter-spacing: 2px;
      }
      
      .btn {
        min-width: 80px;
        padding: 0.6rem 1rem;
        font-size: 0.8rem;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="clock-card">
      <div class="header">
        <div class="title">DIGITAL CLOCK</div>
        <button class="mode-toggle" id="modeToggle" title="Toggle Day/Night Mode">
          <svg class="sun-icon" viewBox="0 0 24 24">
            <path d="M12 7c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5zM2 13h2c.55 0 1-.45 1-1s-.45-1-1-1H2c-.55 0-1 .45-1 1s.45 1 1 1zm18 0h2c.55 0 1-.45 1-1s-.45-1-1-1h-2c-.55 0-1 .45-1 1s.45 1 1 1zM11 2v2c0 .55.45 1 1 1s1-.45 1-1V2c0-.55-.45-1-1-1s-1 .45-1 1zm0 18v2c0 .55.45 1 1 1s1-.45 1-1v-2c0-.55-.45-1-1-1s-1 .45-1 1zM5.99 4.58c-.39-.39-1.03-.39-1.41 0-.39.39-.39 1.03 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0s.39-1.03 0-1.41L5.99 4.58zm12.37 12.37c-.39-.39-1.03-.39-1.41 0-.39.39-.39 1.03 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0 .39-.39.39-1.03 0-1.41l-1.06-1.06zm1.06-10.96c.39-.39.39-1.03 0-1.41-.39-.39-1.03-.39-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06zM7.05 18.36c.39-.39.39-1.03 0-1.41-.39-.39-1.03-.39-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06z"/>
          </svg>
          <svg class="moon-icon" style="display:none" viewBox="0 0 24 24">
            <path d="M12 3c-4.97 0-9 4.03-9 9s4.03 9 9 9 9-4.03 9-9c0-.46-.04-.92-.1-1.36-.98 1.37-2.58 2.26-4.4 2.26-2.98 0-5.4-2.42-5.4-5.4 0-1.81.89-3.42 2.26-4.4-.44-.06-.9-.1-1.36-.1z"/>
          </svg>
        </button>
      </div>

      <div class="tabs">
        <button class="tab active" data-tab="clock">Clock</button>
        <button class="tab" data-tab="stopwatch">Stopwatch</button>
        <button class="tab" data-tab="alarm">Alarm</button>
      </div>

      <div class="tab-content active" id="clock">
        <div class="time-display" id="timeDisplay">00:00:00</div>
        <div class="date-display" id="dateDisplay">Loading...</div>
        <div class="format-toggle">
          <button class="format-btn active" data-format="12">12 Hour</button>
          <button class="format-btn" data-format="24">24 Hour</button>
        </div>
      </div>

      <div class="tab-content" id="stopwatch">
        <div class="time-display" id="stopwatchDisplay">00:00:00</div>
        <div class="controls">
          <button class="btn" id="startStopBtn">Start</button>
          <button class="btn secondary" id="lapBtn" disabled>Lap</button>
          <button class="btn secondary" id="resetBtn">Reset</button>
        </div>
        <div class="laps-container" id="lapsContainer"></div>
      </div>

      <div class="tab-content" id="alarm">
        <div class="alarm-inputs">
          <select class="alarm-select" id="alarmHour"></select>
          <span style="font-size:1.5rem;align-self:center">:</span>
          <select class="alarm-select" id="alarmMinute"></select>
        </div>
        <div class="controls">
          <button class="btn" id="addAlarmBtn">Add Alarm</button>
        </div>
        <div class="alarm-list" id="alarmList"></div>
      </div>
    </div>
  </div>

  <div class="alarm-ring" id="alarmRing">
    <div class="alarm-popup">
      <h2>ALARM!</h2>
      <p>Time's up!</p>
      <button class="btn" id="stopAlarmBtn">Stop Alarm</button>
    </div>
  </div>

  <audio id="alarmSound" loop>
    <source src="alarm.mp3" type="audio/mpeg">
  </audio>

  <script>
    const state = {
      is24Hour: false,
      isDark: localStorage.getItem('darkMode') === 'true',
      stopwatch: {
        running: false,
        time: 0,
        laps: []
      },
      alarms: JSON.parse(localStorage.getItem('alarms') || '[]'),
      activeAlarm: null
    };

    const elements = {
      modeToggle: document.getElementById('modeToggle'),
      sunIcon: document.querySelector('.sun-icon'),
      moonIcon: document.querySelector('.moon-icon'),
      timeDisplay: document.getElementById('timeDisplay'),
      dateDisplay: document.getElementById('dateDisplay'),
      stopwatchDisplay: document.getElementById('stopwatchDisplay'),
      startStopBtn: document.getElementById('startStopBtn'),
      lapBtn: document.getElementById('lapBtn'),
      resetBtn: document.getElementById('resetBtn'),
      lapsContainer: document.getElementById('lapsContainer'),
      alarmHour: document.getElementById('alarmHour'),
      alarmMinute: document.getElementById('alarmMinute'),
      addAlarmBtn: document.getElementById('addAlarmBtn'),
      alarmList: document.getElementById('alarmList'),
      alarmRing: document.getElementById('alarmRing'),
      stopAlarmBtn: document.getElementById('stopAlarmBtn'),
      alarmSound: document.getElementById('alarmSound')
    };

    function init() {
      applyTheme();
      populateAlarmSelects();
      renderAlarms();
      setupEventListeners();
      setInterval(updateClock, 1000);
      setInterval(updateStopwatch, 10);
      updateClock();
    }

    function applyTheme() {
      if (state.isDark) {
        document.body.classList.add('dark');
        elements.sunIcon.style.display = 'none';
        elements.moonIcon.style.display = 'block';
      } else {
        document.body.classList.remove('dark');
        elements.sunIcon.style.display = 'block';
        elements.moonIcon.style.display = 'none';
      }
    }

    function updateClock() {
      const now = new Date();
      let hours = now.getHours();
      const minutes = now.getMinutes().toString().padStart(2, '0');
      const seconds = now.getSeconds().toString().padStart(2, '0');
      
      if (!state.is24Hour) {
        const period = hours >= 12 ? 'PM' : 'AM';
        hours = hours % 12 || 12;
        elements.timeDisplay.textContent = `${hours}:${minutes}:${seconds}`;
        elements.dateDisplay.textContent = `${now.toLocaleDateString('en-US', { weekday: 'long' })}, ${now.toLocaleDateString('en-US', { month: 'long', day: 'numeric' })}, ${now.getFullYear()} | ${period}`;
      } else {
        elements.timeDisplay.textContent = `${hours.toString().padStart(2, '0')}:${minutes}:${seconds}`;
        elements.dateDisplay.textContent = `${now.toLocaleDateString('en-US', { weekday: 'long' })}, ${now.toLocaleDateString('en-US', { month: 'long', day: 'numeric' })}, ${now.getFullYear()}`;
      }

      checkAlarms(now);
    }

    function checkAlarms(now) {
      const currentTime = `${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}`;
      
      state.alarms.forEach(alarm => {
        if (alarm.enabled && alarm.time === currentTime && now.getSeconds() === 0) {
          triggerAlarm(alarm);
        }
      });
    }

    function triggerAlarm(alarm) {
      if (!state.activeAlarm) {
        state.activeAlarm = alarm;
        elements.alarmRing.classList.add('active');
        elements.alarmSound.play().catch(() => console.log('Audio requires user interaction first'));
      }
    }

    function stopAlarm() {
      elements.alarmRing.classList.remove('active');
      elements.alarmSound.pause();
      elements.alarmSound.currentTime = 0;
      state.activeAlarm = null;
    }

    function populateAlarmSelects() {
      for (let i = 0; i < 24; i++) {
        const option = document.createElement('option');
        option.value = i.toString().padStart(2, '0');
        option.textContent = i.toString().padStart(2, '0');
        elements.alarmHour.appendChild(option);
      }
      
      for (let i = 0; i < 60; i++) {
        const option = document.createElement('option');
        option.value = i.toString().padStart(2, '0');
        option.textContent = i.toString().padStart(2, '0');
        elements.alarmMinute.appendChild(option);
      }
    }

    function setupEventListeners() {
      elements.modeToggle.addEventListener('click', () => {
        state.isDark = !state.isDark;
        localStorage.setItem('darkMode', state.isDark);
        applyTheme();
      });

      document.querySelectorAll('.tab').forEach(tab => {
        tab.addEventListener('click', () => {
          document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
          document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
          tab.classList.add('active');
          document.getElementById(tab.dataset.tab).classList.add('active');
        });
      });

      document.querySelectorAll('.format-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('.format-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          state.is24Hour = btn.dataset.format === '24';
        });
      });

      elements.startStopBtn.addEventListener('click', toggleStopwatch);
      elements.lapBtn.addEventListener('click', recordLap);
      elements.resetBtn.addEventListener('click', resetStopwatch);
      elements.addAlarmBtn.addEventListener('click', addAlarm);
      elements.stopAlarmBtn.addEventListener('click', stopAlarm);
    }

    function toggleStopwatch() {
      state.stopwatch.running = !state.stopwatch.running;
      elements.startStopBtn.textContent = state.stopwatch.running ? 'Pause' : 'Start';
      elements.lapBtn.disabled = !state.stopwatch.running;
    }

    function updateStopwatch() {
      if (state.stopwatch.running) {
        state.stopwatch.time += 10;
      }
      
      const minutes = Math.floor(state.stopwatch.time / 60000);
      const seconds = Math.floor((state.stopwatch.time % 60000) / 1000);
      const ms = Math.floor((state.stopwatch.time % 1000) / 10);
      
      elements.stopwatchDisplay.textContent = 
        `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}:${ms.toString().padStart(2, '0')}`;
    }

    function recordLap() {
      const lapTime = elements.stopwatchDisplay.textContent;
      state.stopwatch.laps.unshift({ time: lapTime, index: state.stopwatch.laps.length + 1 });
      
      if (state.stopwatch.laps.length > 20) {
        state.stopwatch.laps.pop();
      }
      
      renderLaps();
    }

    function renderLaps() {
      elements.lapsContainer.innerHTML = state.stopwatch.laps.map((lap, i) => `
        <div class="lap-item">
          <span>Lap ${state.stopwatch.laps.length - i}</span>
          <span>${lap.time}</span>
        </div>
      `).join('');
    }

    function resetStopwatch() {
      state.stopwatch.running = false;
      state.stopwatch.time = 0;
      state.stopwatch.laps = [];
      elements.startStopBtn.textContent = 'Start';
      elements.lapBtn.disabled = true;
      elements.stopwatchDisplay.textContent = '00:00:00';
      elements.lapsContainer.innerHTML = '';
    }

    function addAlarm() {
      const time = `${elements.alarmHour.value}:${elements.alarmMinute.value}`;
      const alarm = {
        id: Date.now(),
        time: time,
        enabled: true
      };
      
      state.alarms.push(alarm);
      localStorage.setItem('alarms', JSON.stringify(state.alarms));
      renderAlarms();
    }

    function renderAlarms() {
      elements.alarmList.innerHTML = state.alarms.map(alarm => `
        <div class="alarm-item">
          <span class="alarm-time">${alarm.time}</span>
          <div class="alarm-actions">
            <label class="toggle-switch">
              <input type="checkbox" ${alarm.enabled ? 'checked' : ''} 
                     onchange="toggleAlarm(${alarm.id})">
              <span class="slider"></span>
            </label>
            <button class="delete-btn" onclick="deleteAlarm(${alarm.id})">
              <svg viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
            </button>
          </div>
        </div>
      `).join('');
    }

    window.toggleAlarm = function(id) {
      const alarm = state.alarms.find(a => a.id === id);
      if (alarm) {
        alarm.enabled = !alarm.enabled;
        localStorage.setItem('alarms', JSON.stringify(state.alarms));
      }
    };

    window.deleteAlarm = function(id) {
      state.alarms = state.alarms.filter(a => a.id !== id);
      localStorage.setItem('alarms', JSON.stringify(state.alarms));
      renderAlarms();
    };

    init();
  </script>
</body>
</html>
